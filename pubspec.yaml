name: genui_x
description: "Connect any LLM — Claude, OpenAI, Gemini, Ollama, or a custom proxy — to Google's genui (Generative UI) framework with one Transport."
version: 0.0.12
repository: https://github.com/thurakhant/genui_x
issue_tracker: https://github.com/thurakhant/genui_x/issues
homepage: https://github.com/thurakhant/genui_x
documentation: https://pub.dev/documentation/genui_x/latest/

# Up to 5 topics. Picked for pub.dev discoverability around the multi-provider
# generative-UI niche. `flutter` is implied by the SDK constraint, so we use
# the slot for a provider keyword instead.
topics:
  - genui
  - llm
  - claude
  - gemini
  - openai

# Screenshots show up on the pub.dev package page. Uncomment + commit the file
# under `screenshots/` to enable. Each path must exist or `dart pub publish`
# will fail. Recommended: a 1280x720 PNG or animated WebP under 4 MB.
#
# screenshots:
#   - description: "genui_x rendering an AI-generated weather card from a chat prompt."
#     path: screenshots/travel_demo.png

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.35.7"

dependencies:
  flutter:
    sdk: flutter
  genui: ^0.8.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

